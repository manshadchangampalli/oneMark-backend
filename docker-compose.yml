version: '3.8'

services:
  db:
    image: postgres:16
    container_name: onemark-pg
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: onemark
    ports:
      - '5432:5432'
    volumes:
      - onemark-pg-data:/var/lib/postgresql/data

volumes:
  onemark-pg-data: